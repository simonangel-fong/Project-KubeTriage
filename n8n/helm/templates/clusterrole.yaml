apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.serviceAccount.name }}
  labels:
    app: {{ .Release.Name }}
rules:
  - apiGroups: [""]
    resources:
      - pods          # get pod status and metadata
      - pods/log      # read container logs
      - events        # read cluster events (CrashLoopBackOff reason lives here)
    verbs:
      - get
      - list
