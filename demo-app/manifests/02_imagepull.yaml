apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-imagepull
  namespace: default
  labels:
    app: nginx-imagepull
    incident: imagepullbackoff
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-imagepull
  template:
    metadata:
      labels:
        app: nginx-imagepull
    spec:
      containers:
      - name: nginx
        image: nginx:does-not-exist
        ports:
        - containerPort: 80