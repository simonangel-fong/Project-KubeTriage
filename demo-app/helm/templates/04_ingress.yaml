apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  ingressClassName: nginx
  rules:
    - host: homelab-demo-app.arguswatcher.net
      http:
        paths:
          - path: / 
            backend:
              service:
                name: {{ .Release.Name }}
                port:
                  number: 80
