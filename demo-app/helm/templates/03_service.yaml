apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-index
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Release.Name }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-error
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-error
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Release.Name }}-error
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: 80