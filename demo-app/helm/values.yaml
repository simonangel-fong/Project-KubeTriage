replicaCount: 1

image:
  repository: nginx
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    memory: "32Mi"
    cpu: "50m"
  limits:
    memory: "64Mi"
    cpu: "100m"

readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10
livenessProbe:
  initialDelaySeconds: 10
  periodSeconds: 15

# nginx configuration — edit this to simulate an incident
nginx:
  config: |
    server {
      listen 80;
      server_name localhost;

      location / {
        root   /usr/share/nginx/html;
        index  index.html;
      
      # comment closing brace — nginx config test will fail
      }

      location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
      
      }   
    }
  index: |
    <!DOCTYPE html>
    <html lang="en">

    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Index</title>
      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        body {
          background-color: #2e7d32;
          color: #ffffff;
          font-family: Arial, sans-serif;
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
          flex-direction: column;
          gap: 16px;
        }

        h1 {
          font-size: 6rem;
          font-weight: bold;
        }

        p {
          font-size: 1.5rem;
          opacity: 0.85;
        }
      </style>
    </head>

    <body>
      <h1>Demo App</h1>
      <p>ArgoCD Rollout — Healthily</p>
    </body>

    </html>
  error: |
    <!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Index</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background-color: #c62828;
                color: #ffffff;
                font-family: Arial, sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                flex-direction: column;
                gap: 16px;
            }

            h1 {
                font-size: 6rem;
                font-weight: bold;
            }

            p {
                font-size: 1.5rem;
                opacity: 0.85;
            }
        </style>
    </head>

    <body>
        <h1>404</h1>
        <p>ArgoCD Rollout — Error</p>
    </body>

    </html>