apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubetriage
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubetriage-readonly
  namespace: default
rules:
  - apiGroups: ["", "apps"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubetriage-readonly-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: kubetriage
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubetriage-readonly